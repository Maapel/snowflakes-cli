<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snowflakes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --text-color: #f1f5f9;
            --card-bg: rgba(30, 41, 59, 0.7);
            --card-border: rgba(255, 255, 255, 0.1);
            --primary: #38bdf8;
            --secondary: #818cf8;
            --accent: #f472b6;
            --success: #4ade80;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: 1px solid rgba(255, 255, 255, 0.1);
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            background-image:
                radial-gradient(at 0% 0%, hsla(253, 16%, 7%, 1) 0, transparent 50%),
                radial-gradient(at 50% 0%, hsla(225, 39%, 30%, 1) 0, transparent 50%),
                radial-gradient(at 100% 0%, hsla(339, 49%, 30%, 1) 0, transparent 50%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        header {
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
            border-bottom: var(--glass-border);
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(15, 23, 42, 0.8);
            gap: 1rem;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .header-controls {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            white-space: nowrap;
            cursor: pointer;
        }

        button.btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 0.75rem;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(56, 189, 248, 0.3);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            white-space: nowrap;
        }

        button.btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(56, 189, 248, 0.4);
        }

        .btn-back {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: var(--text-color);
            padding: 0.5rem 1rem;
            border-radius: 0.75rem;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .btn-back:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        select.filter-select {
            padding: 0.75rem 1rem;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 0.75rem;
            color: white;
            font-size: 0.9rem;
            cursor: pointer;
            min-width: 150px;
        }

        select.filter-select:focus {
            outline: none;
            border-color: var(--primary);
        }

        /* ======================== */
        /* Dashboard View           */
        /* ======================== */

        #dashboardView {
            flex: 1;
            padding: 2rem;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
        }

        .project-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 1rem;
            padding: 1.5rem;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: var(--shadow);
        }

        .project-card:hover {
            transform: translateY(-4px);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 12px 20px -4px rgba(0, 0, 0, 0.3);
        }

        .project-card-name {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
        }

        .project-card-path {
            font-size: 0.8rem;
            color: #64748b;
            margin-bottom: 1rem;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .project-stats {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 1rem;
        }

        .stat-badge {
            padding: 0.25rem 0.6rem;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .stat-todo { background: rgba(56, 189, 248, 0.15); color: var(--primary); }
        .stat-in_progress { background: rgba(250, 204, 21, 0.15); color: #facc15; }
        .stat-review { background: rgba(129, 140, 248, 0.15); color: var(--secondary); }
        .stat-done { background: rgba(74, 222, 128, 0.15); color: var(--success); }

        .agent-section {
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            padding-top: 0.75rem;
            margin-top: 0.5rem;
        }

        .agent-section-header {
            font-size: 0.8rem;
            font-weight: 600;
            color: #94a3b8;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .agent-ticket-item {
            font-size: 0.8rem;
            color: #cbd5e1;
            padding: 0.25rem 0;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .agent-ticket-item .ticket-id {
            color: var(--secondary);
            font-weight: 600;
        }

        .pulse-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
            display: inline-block;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .no-agent { color: #475569; font-size: 0.8rem; font-style: italic; }

        /* ======================== */
        /* Board View               */
        /* ======================== */

        #boardView {
            flex: 1;
            padding: 2rem;
            display: flex;
            flex-direction: column;
        }

        .board-wrapper {
            flex: 1;
            overflow-x: auto;
            transition: margin-right 0.3s ease;
        }

        .board-wrapper.panel-open {
            margin-right: 420px;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(4, 300px);
            gap: 1.5rem;
            height: calc(100vh - 120px);
        }

        .column {
            background: var(--glass-bg);
            border: var(--glass-border);
            border-radius: 1rem;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            backdrop-filter: blur(5px);
            min-height: 200px;
            transition: background 0.3s;
        }

        .column.drag-over {
            background: rgba(56, 189, 248, 0.1);
            border-color: var(--primary);
        }

        .column-header {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #94a3b8;
            font-weight: 600;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: space-between;
        }

        .column-count {
            background: rgba(255, 255, 255, 0.1);
            padding: 0.1rem 0.5rem;
            border-radius: 1rem;
            font-size: 0.8rem;
        }

        .ticket {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 0.75rem;
            padding: 1rem;
            cursor: grab;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
            box-shadow: var(--shadow);
            user-select: none;
        }

        .ticket:hover {
            transform: translateY(-3px) scale(1.02);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2);
        }

        .ticket:active { cursor: grabbing; }
        .ticket.dragging { opacity: 0.5; transform: scale(0.95); }
        .ticket.selected { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.3); }

        .ticket::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
        }

        .ticket.type-STORY::before { background: var(--primary); }
        .ticket.type-BUG::before { background: var(--accent); }
        .ticket.type-TASK::before { background: var(--success); }

        .ticket-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: #94a3b8;
            margin-bottom: 0.5rem;
        }

        .ticket-title {
            font-weight: 600;
            margin-bottom: 0.5rem;
            line-height: 1.4;
        }

        .ticket-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            color: #cbd5e1;
            margin-top: 0.75rem;
        }

        .badge {
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.1);
            font-size: 0.7rem;
        }

        .avatar {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.6rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        /* ======================== */
        /* Slide-out Chat Panel     */
        /* ======================== */

        .chat-panel {
            position: fixed;
            top: 0;
            right: -420px;
            width: 400px;
            height: 100vh;
            background: #1e293b;
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 200;
            display: flex;
            flex-direction: column;
            transition: right 0.3s ease;
            box-shadow: -4px 0 20px rgba(0, 0, 0, 0.3);
        }

        .chat-panel.open {
            right: 0;
        }

        .chat-panel-header {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-panel-header h3 {
            font-size: 1rem;
            font-weight: 600;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
            margin-right: 1rem;
        }

        .chat-panel-close {
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 0.25rem;
        }

        .chat-panel-close:hover { color: var(--text-color); }

        /* Details section */
        .details-section {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .details-toggle {
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0;
            margin-bottom: 0.5rem;
        }

        .details-toggle:hover { color: var(--text-color); }

        .details-body {
            display: none;
        }

        .details-body.open {
            display: block;
        }

        .detail-row {
            margin-bottom: 0.75rem;
        }

        .detail-row label {
            display: block;
            font-size: 0.75rem;
            color: #64748b;
            margin-bottom: 0.25rem;
        }

        .detail-row input,
        .detail-row textarea,
        .detail-row select {
            width: 100%;
            padding: 0.5rem 0.75rem;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 0.5rem;
            color: white;
            font-size: 0.85rem;
        }

        .detail-row textarea {
            resize: vertical;
            min-height: 60px;
        }

        .details-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        .btn-save-details {
            background: var(--primary);
            border: none;
            color: white;
            padding: 0.4rem 1rem;
            border-radius: 0.5rem;
            font-size: 0.8rem;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-save-details:hover { opacity: 0.9; }

        /* Chat messages */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 1rem 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .chat-bubble {
            max-width: 85%;
            padding: 0.75rem 1rem;
            border-radius: 1rem;
            font-size: 0.9rem;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .chat-bubble.me {
            align-self: flex-end;
            background: rgba(56, 189, 248, 0.2);
            border: 1px solid rgba(56, 189, 248, 0.3);
            border-bottom-right-radius: 0.25rem;
        }

        .chat-bubble.ai {
            align-self: flex-start;
            background: rgba(129, 140, 248, 0.15);
            border: 1px solid rgba(129, 140, 248, 0.25);
            border-bottom-left-radius: 0.25rem;
        }

        .chat-bubble .bubble-author {
            font-size: 0.7rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
            opacity: 0.7;
        }

        .chat-bubble .bubble-time {
            font-size: 0.65rem;
            opacity: 0.5;
            margin-top: 0.35rem;
            text-align: right;
        }

        .chat-empty {
            color: #475569;
            font-size: 0.9rem;
            text-align: center;
            margin-top: 2rem;
        }

        /* Chat input */
        .chat-input-bar {
            padding: 1rem 1.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            gap: 0.5rem;
        }

        .chat-input-bar input {
            flex: 1;
            padding: 0.65rem 1rem;
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 0.75rem;
            color: white;
            font-size: 0.9rem;
        }

        .chat-input-bar input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .chat-input-bar button {
            background: var(--primary);
            border: none;
            color: white;
            padding: 0.65rem 1.25rem;
            border-radius: 0.75rem;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
        }

        .chat-input-bar button:hover { opacity: 0.9; }

        /* ======================== */
        /* Create Modal             */
        /* ======================== */

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 1000;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .modal {
            background: #1e293b;
            width: 100%;
            max-width: 500px;
            border-radius: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 2rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
            transform: translateY(20px);
            transition: transform 0.3s ease;
        }

        .modal-overlay.active .modal { transform: translateY(0); }

        .form-group { margin-bottom: 1.5rem; }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            color: #94a3b8;
        }

        input, textarea, select {
            width: 100%;
            padding: 0.75rem;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 0.5rem;
            color: white;
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--primary);
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
            margin-top: 2rem;
        }

        .btn-cancel {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #cbd5e1;
            padding: 0.75rem 1.5rem;
            border-radius: 0.75rem;
            cursor: pointer;
        }

        .loading-spinner {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-left-color: var(--primary);
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Combobox */
        .combobox-container { position: relative; }

        .dropdown-menu {
            position: absolute;
            top: 100%;
            left: 0;
            width: 100%;
            background: #1e293b;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 0.5rem;
            margin-top: 0.25rem;
            max-height: 200px;
            overflow-y: auto;
            z-index: 1000;
            display: none;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        .dropdown-menu.show { display: block; }

        .dropdown-item {
            padding: 0.75rem 1rem;
            cursor: pointer;
            color: #cbd5e1;
            transition: background 0.2s;
        }

        .dropdown-item:hover, .dropdown-item.active {
            background: rgba(56, 189, 248, 0.1);
            color: var(--primary);
        }

        .create-option {
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--success);
            font-weight: 500;
        }

        .project-header-info {
            font-size: 0.8rem;
            color: #64748b;
            margin-left: 0.5rem;
        }
    </style>
</head>

<body>

    <header>
        <div class="header-left">
            <button class="btn-back" id="backBtn" style="display:none" onclick="location.hash='#/'">&#8592; Dashboard</button>
            <h1 onclick="location.hash='#/'">&#10052; Snowflakes</h1>
            <span class="project-header-info" id="projectHeaderInfo"></span>
            <div class="header-controls" id="boardControls" style="display:none">
                <select id="sprintFilter" class="filter-select">
                    <option value="ALL">All Sprints</option>
                </select>
                <select id="userFilter" class="filter-select">
                    <option value="ALL">All Users</option>
                </select>
            </div>
        </div>

        <button class="btn-primary" id="newTicketBtn" style="display:none" onclick="openModal()">
            <span>+</span> New Ticket
        </button>
    </header>

    <!-- ========== Dashboard View ========== -->
    <div id="dashboardView" style="display:none">
        <div class="dashboard-grid" id="dashboardGrid">
            <!-- Project cards rendered here -->
        </div>
    </div>

    <!-- ========== Board View ========== -->
    <div id="boardView" style="display:none">
        <div class="board-wrapper" id="boardWrapper">
            <div class="board">
                <div class="column" id="col-TODO" data-status="TODO">
                    <div class="column-header">Todo <span class="column-count">0</span></div>
                </div>
                <div class="column" id="col-IN_PROGRESS" data-status="IN_PROGRESS">
                    <div class="column-header">In Progress <span class="column-count">0</span></div>
                </div>
                <div class="column" id="col-REVIEW" data-status="REVIEW">
                    <div class="column-header">Review <span class="column-count">0</span></div>
                </div>
                <div class="column" id="col-DONE" data-status="DONE">
                    <div class="column-header">Done <span class="column-count">0</span></div>
                </div>
            </div>
        </div>
    </div>

    <!-- ========== Chat Panel ========== -->
    <div class="chat-panel" id="chatPanel">
        <div class="chat-panel-header">
            <h3 id="chatPanelTitle">Ticket</h3>
            <button class="chat-panel-close" onclick="closeChatPanel()">&times;</button>
        </div>
        <div class="details-section">
            <button class="details-toggle" onclick="toggleDetails()">
                <span id="detailsArrow">&#9654;</span> Details
            </button>
            <div class="details-body" id="detailsBody">
                <div class="detail-row">
                    <label>Title</label>
                    <input type="text" id="panelTitle">
                </div>
                <div class="detail-row">
                    <label>Description</label>
                    <textarea id="panelDesc" rows="3"></textarea>
                </div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:0.75rem;">
                    <div class="detail-row">
                        <label>Type</label>
                        <select id="panelType">
                            <option value="TASK">Task</option>
                            <option value="STORY">Story</option>
                            <option value="BUG">Bug</option>
                        </select>
                    </div>
                    <div class="detail-row">
                        <label>Priority</label>
                        <select id="panelPrio">
                            <option value="MEDIUM">Medium</option>
                            <option value="HIGH">High</option>
                            <option value="LOW">Low</option>
                        </select>
                    </div>
                </div>
                <div class="details-actions">
                    <button class="btn-save-details" onclick="saveTicketDetails()">Save</button>
                </div>
            </div>
        </div>
        <div class="chat-messages" id="chatMessages">
            <div class="chat-empty">No conversation yet.</div>
        </div>
        <div class="chat-input-bar">
            <input type="text" id="chatInput" placeholder="Type a message..." autocomplete="off">
            <button onclick="sendChatMessage()">Send</button>
        </div>
    </div>

    <!-- ========== Create Ticket Modal ========== -->
    <div class="modal-overlay" id="createModal">
        <div class="modal">
            <h2 style="margin-bottom: 1.5rem;">Create New Ticket</h2>
            <form id="createForm">
                <div class="form-group">
                    <label>Title</label>
                    <input type="text" name="title" required placeholder="e.g., Fix login bug">
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea name="description" rows="3" placeholder="Details..."></textarea>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label>Type</label>
                        <select name="type">
                            <option value="TASK">Task</option>
                            <option value="STORY">Story</option>
                            <option value="BUG">Bug</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Priority</label>
                        <select name="priority">
                            <option value="MEDIUM">Medium</option>
                            <option value="HIGH">High</option>
                            <option value="LOW">Low</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>Sprint</label>
                    <div class="combobox-container">
                        <input type="text" name="sprint" value="Backlog" id="modalSprintInput" autocomplete="off">
                        <div class="dropdown-menu" id="sprintDropdown"></div>
                    </div>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-cancel" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn-primary" id="submitBtn">Create Ticket</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // =====================
        // State
        // =====================
        let currentProjectId = null;
        let allTickets = [];
        let dragSrcEl = null;
        let selectedTicket = null;

        // =====================
        // Router
        // =====================
        function getApiBase() {
            if (currentProjectId !== null) {
                return `/api/projects/${currentProjectId}/tickets`;
            }
            return '/api/tickets';
        }

        window.addEventListener('hashchange', route);
        function route() {
            const hash = location.hash || '#/';
            if (hash.startsWith('#/project/')) {
                currentProjectId = parseInt(hash.split('/')[2]);
                showBoardView();
            } else {
                currentProjectId = null;
                showDashboardView();
            }
        }

        function showDashboardView() {
            document.getElementById('dashboardView').style.display = '';
            document.getElementById('boardView').style.display = 'none';
            document.getElementById('boardControls').style.display = 'none';
            document.getElementById('newTicketBtn').style.display = 'none';
            document.getElementById('backBtn').style.display = 'none';
            document.getElementById('projectHeaderInfo').textContent = '';
            closeChatPanel();
            loadProjects();
        }

        function showBoardView() {
            document.getElementById('dashboardView').style.display = 'none';
            document.getElementById('boardView').style.display = '';
            document.getElementById('boardControls').style.display = 'flex';
            document.getElementById('newTicketBtn').style.display = 'flex';
            document.getElementById('backBtn').style.display = '';
            closeChatPanel();
            loadTickets();
        }

        // =====================
        // Dashboard
        // =====================
        async function loadProjects() {
            try {
                const res = await fetch('/api/projects');
                const projects = await res.json();
                renderDashboard(projects);
            } catch (err) {
                console.error("Failed to load projects", err);
                // Fallback: if no projects endpoint, go straight to board
                document.getElementById('dashboardView').innerHTML = '<div style="padding:2rem;color:#64748b;">No projects registered yet. Run <code>sw list</code> in a project directory to register it.</div>';
            }
        }

        function renderDashboard(projects) {
            const grid = document.getElementById('dashboardGrid');
            grid.innerHTML = '';

            if (projects.length === 0) {
                grid.innerHTML = '<div style="color:#64748b; grid-column:1/-1; text-align:center; padding:3rem;">No projects registered yet. Run <code style="color:var(--primary)">sw list</code> in a project directory to register it.</div>';
                return;
            }

            projects.forEach(p => {
                const card = document.createElement('div');
                card.className = 'project-card';
                card.onclick = () => { location.hash = `#/project/${p.id}`; };

                const s = p.stats;
                const hasActiveAgent = s.agent_tickets.some(t => t.status === 'IN_PROGRESS');

                let agentHtml = '';
                if (s.agent_tickets.length > 0) {
                    agentHtml = s.agent_tickets.map(t =>
                        `<div class="agent-ticket-item"><span class="ticket-id">#${t.id}</span> ${escapeHtml(t.title)}</div>`
                    ).join('');
                } else {
                    agentHtml = '<div class="no-agent">(none)</div>';
                }

                card.innerHTML = `
                    <div class="project-card-name">${escapeHtml(p.name)}</div>
                    <div class="project-card-path">${escapeHtml(p.path)}</div>
                    <div class="project-stats">
                        <span class="stat-badge stat-todo">TODO: ${s.todo}</span>
                        <span class="stat-badge stat-in_progress">In Progress: ${s.in_progress}</span>
                        <span class="stat-badge stat-review">Review: ${s.review}</span>
                        <span class="stat-badge stat-done">Done: ${s.done}</span>
                    </div>
                    <div class="agent-section">
                        <div class="agent-section-header">
                            ${hasActiveAgent ? '<span class="pulse-dot"></span>' : ''}
                            &#129302; AI Active: ${s.agent_active}
                        </div>
                        ${agentHtml}
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        // =====================
        // Board
        // =====================
        async function loadTickets() {
            try {
                const res = await fetch(getApiBase());
                allTickets = await res.json();
                populateFilters(allTickets);
                renderBoard();
                // Update header info
                if (currentProjectId !== null) {
                    try {
                        const projRes = await fetch('/api/projects');
                        const projects = await projRes.json();
                        const proj = projects.find(p => p.id === currentProjectId);
                        if (proj) {
                            document.getElementById('projectHeaderInfo').textContent = `${proj.name} - ${proj.path}`;
                        }
                    } catch(e) {}
                }
            } catch (err) {
                console.error("Failed to load tickets", err);
            }
        }

        function populateFilters(tickets) {
            const sprintFilter = document.getElementById('sprintFilter');
            const userFilter = document.getElementById('userFilter');
            const currentSprint = sprintFilter.value;
            const currentUser = userFilter.value;

            const sprints = new Set();
            const users = new Set();
            tickets.forEach(t => {
                if (t.sprint) sprints.add(t.sprint);
                if (t.assignee) users.add(t.assignee);
            });

            sprintFilter.innerHTML = '<option value="ALL">All Sprints</option>';
            Array.from(sprints).sort().forEach(s => {
                const opt = document.createElement('option');
                opt.value = s;
                opt.textContent = s;
                sprintFilter.appendChild(opt);
            });
            sprintFilter.value = currentSprint;
            if (sprintFilter.value !== currentSprint) sprintFilter.value = 'ALL';

            userFilter.innerHTML = '<option value="ALL">All Users</option>';
            Array.from(users).sort().forEach(u => {
                const opt = document.createElement('option');
                opt.value = u;
                opt.textContent = u;
                userFilter.appendChild(opt);
            });
            userFilter.value = currentUser;
            if (userFilter.value !== currentUser) userFilter.value = 'ALL';
        }

        function renderBoard() {
            const sprintFilterVal = document.getElementById('sprintFilter').value;
            const userFilterVal = document.getElementById('userFilter').value;

            const tickets = allTickets.filter(t => {
                const matchSprint = sprintFilterVal === 'ALL' || t.sprint === sprintFilterVal;
                const matchUser = userFilterVal === 'ALL' || t.assignee === userFilterVal;
                return matchSprint && matchUser;
            });

            document.querySelectorAll('.column-count').forEach(el => el.textContent = '0');
            ['TODO', 'IN_PROGRESS', 'REVIEW', 'DONE'].forEach(status => {
                const col = document.getElementById(`col-${status}`);
                while (col.childNodes.length > 2) {
                    col.removeChild(col.lastChild);
                }
            });

            tickets.forEach(t => {
                const card = createTicketCard(t);
                const status = t.status || 'TODO';
                const col = document.getElementById(`col-${status}`);
                if (col) {
                    col.appendChild(card);
                    const countSpan = col.querySelector('.column-count');
                    countSpan.textContent = parseInt(countSpan.textContent) + 1;
                }
            });

            bindTicketEvents();
        }

        function createTicketCard(t) {
            const div = document.createElement('div');
            div.className = `ticket type-${t.type}`;
            if (selectedTicket && selectedTicket.id === t.id) {
                div.classList.add('selected');
            }
            div.setAttribute('draggable', 'true');
            div.dataset.id = t.id;
            div.onclick = (e) => {
                if (div.classList.contains('dragging')) return;
                openChatPanel(t);
            };
            div.innerHTML = `
                <div class="ticket-header">
                    <span>#${t.id} ${escapeHtml(t.sprint)}</span>
                    <span>${getIcon(t.type)}</span>
                </div>
                <div class="ticket-title">${escapeHtml(t.title)}</div>
                <div style="font-size:0.8rem;opacity:0.7;margin-bottom:0.5rem;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">${escapeHtml(t.description || '')}</div>
                <div class="ticket-meta">
                    <span class="badge">${t.points} pts</span>
                    <div class="avatar" title="${escapeHtml(t.assignee)}">${escapeHtml((t.assignee || '').substring(0, 2))}</div>
                </div>
            `;
            return div;
        }

        function getIcon(type) {
            if (type === 'BUG') return '&#128030;';
            if (type === 'STORY') return '&#128221;';
            return '&#128296;';
        }

        // =====================
        // Drag & Drop
        // =====================
        function bindTicketEvents() {
            document.querySelectorAll('.ticket').forEach(ticket => {
                ticket.addEventListener('dragstart', handleDragStart);
                ticket.addEventListener('dragend', handleDragEnd);
            });
        }

        function setupColumnDnD() {
            document.querySelectorAll('.column').forEach(col => {
                col.addEventListener('dragover', handleDragOver);
                col.addEventListener('dragleave', handleDragLeave);
                col.addEventListener('drop', handleDrop);
            });
        }

        function handleDragStart(e) {
            dragSrcEl = this;
            this.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', this.dataset.id);
        }

        function handleDragEnd() {
            this.classList.remove('dragging');
            document.querySelectorAll('.column').forEach(col => col.classList.remove('drag-over'));
        }

        function handleDragOver(e) {
            e.preventDefault();
            this.classList.add('drag-over');
            e.dataTransfer.dropEffect = 'move';
            return false;
        }

        function handleDragLeave() { this.classList.remove('drag-over'); }

        async function handleDrop(e) {
            e.stopPropagation();
            this.classList.remove('drag-over');

            const ticketId = e.dataTransfer.getData('text/plain');
            const newStatus = this.getAttribute('data-status');

            if (dragSrcEl) {
                this.appendChild(dragSrcEl);
                const ticket = allTickets.find(t => t.id == ticketId);
                if (ticket) ticket.status = newStatus;
                renderBoard();

                try {
                    const res = await fetch(`${getApiBase()}/${ticketId}/move`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ status: newStatus })
                    });
                    if (!res.ok) {
                        alert("Failed to move ticket on server");
                        loadTickets();
                    }
                } catch (err) {
                    console.error("Move failed", err);
                    loadTickets();
                }
            }
            return false;
        }

        document.getElementById('sprintFilter').addEventListener('change', renderBoard);
        document.getElementById('userFilter').addEventListener('change', renderBoard);

        // =====================
        // Chat Panel
        // =====================
        function openChatPanel(ticket) {
            selectedTicket = ticket;
            const panel = document.getElementById('chatPanel');
            document.getElementById('chatPanelTitle').textContent = `#${ticket.id} ${ticket.title}`;
            document.getElementById('panelTitle').value = ticket.title;
            document.getElementById('panelDesc').value = ticket.description || '';
            document.getElementById('panelType').value = ticket.type;
            document.getElementById('panelPrio').value = ticket.priority;

            panel.classList.add('open');
            document.getElementById('boardWrapper').classList.add('panel-open');
            renderBoard(); // re-render to highlight selected

            loadChatMessages(ticket.id);
        }

        function closeChatPanel() {
            selectedTicket = null;
            document.getElementById('chatPanel').classList.remove('open');
            document.getElementById('boardWrapper').classList.remove('panel-open');
            // Close details
            document.getElementById('detailsBody').classList.remove('open');
            document.getElementById('detailsArrow').innerHTML = '&#9654;';
            renderBoard();
        }

        function toggleDetails() {
            const body = document.getElementById('detailsBody');
            const arrow = document.getElementById('detailsArrow');
            body.classList.toggle('open');
            arrow.innerHTML = body.classList.contains('open') ? '&#9660;' : '&#9654;';
        }

        async function saveTicketDetails() {
            if (!selectedTicket) return;
            const payload = {
                title: document.getElementById('panelTitle').value,
                description: document.getElementById('panelDesc').value,
                type: document.getElementById('panelType').value,
                priority: document.getElementById('panelPrio').value
            };

            try {
                const res = await fetch(`${getApiBase()}/${selectedTicket.id}/update`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (res.ok) {
                    // Update local state
                    Object.assign(selectedTicket, payload);
                    document.getElementById('chatPanelTitle').textContent = `#${selectedTicket.id} ${payload.title}`;
                    loadTickets();
                } else {
                    alert("Failed to update ticket");
                }
            } catch (err) {
                console.error("Update failed", err);
            }
        }

        async function loadChatMessages(ticketId) {
            const container = document.getElementById('chatMessages');
            try {
                const res = await fetch(`${getApiBase()}/${ticketId}/comments`);
                const comments = await res.json();

                if (comments.length === 0) {
                    container.innerHTML = '<div class="chat-empty">No conversation yet.</div>';
                } else {
                    container.innerHTML = '';
                    comments.forEach(c => {
                        const bubble = document.createElement('div');
                        const isAi = c.author === 'ai';
                        bubble.className = `chat-bubble ${isAi ? 'ai' : 'me'}`;
                        const dateStr = new Date(c.created_at).toLocaleString();
                        bubble.innerHTML = `
                            <div class="bubble-author">${escapeHtml(c.author)}</div>
                            <div>${escapeHtml(c.content)}</div>
                            <div class="bubble-time">${dateStr}</div>
                        `;
                        container.appendChild(bubble);
                    });
                    // Auto-scroll to bottom
                    container.scrollTop = container.scrollHeight;
                }
            } catch (err) {
                console.error("Failed to load comments", err);
                container.innerHTML = '<div class="chat-empty">Failed to load messages.</div>';
            }
        }

        async function sendChatMessage() {
            if (!selectedTicket) return;
            const input = document.getElementById('chatInput');
            const content = input.value.trim();
            if (!content) return;

            try {
                const res = await fetch(`${getApiBase()}/${selectedTicket.id}/comments`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content: content, author: 'me' })
                });
                if (res.ok) {
                    input.value = '';
                    await loadChatMessages(selectedTicket.id);
                } else {
                    alert("Failed to send message");
                }
            } catch (err) {
                console.error("Send failed", err);
            }
        }

        document.getElementById('chatInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendChatMessage();
        });

        // =====================
        // Create Ticket Modal
        // =====================
        const modal = document.getElementById('createModal');
        const form = document.getElementById('createForm');

        function openModal() {
            modal.classList.add('active');
            const currentSprint = document.getElementById('sprintFilter').value;
            if (currentSprint !== 'ALL') {
                document.getElementById('modalSprintInput').value = currentSprint;
            }
        }

        function closeModal() {
            modal.classList.remove('active');
            form.reset();
        }

        modal.addEventListener('click', (e) => {
            if (e.target === modal) closeModal();
        });

        // Sprint Combobox
        const sprintInput = document.getElementById('modalSprintInput');
        const sprintDropdown = document.getElementById('sprintDropdown');

        sprintInput.addEventListener('focus', () => {
            updateSprintDropdown();
            sprintDropdown.classList.add('show');
        });

        sprintInput.addEventListener('input', () => {
            updateSprintDropdown();
            sprintDropdown.classList.add('show');
        });

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.combobox-container')) {
                sprintDropdown.classList.remove('show');
            }
        });

        function updateSprintDropdown() {
            const query = sprintInput.value.toLowerCase();
            const sprints = getUniqueSprints();
            sprintDropdown.innerHTML = '';
            const matches = sprints.filter(s => s.toLowerCase().includes(query));
            matches.forEach(s => {
                const div = document.createElement('div');
                div.className = 'dropdown-item';
                div.textContent = s;
                div.onclick = () => selectSprint(s);
                sprintDropdown.appendChild(div);
            });
            if (query && !sprints.some(s => s.toLowerCase() === query)) {
                const div = document.createElement('div');
                div.className = 'dropdown-item create-option';
                div.textContent = `+ Create "${sprintInput.value}"`;
                div.onclick = () => selectSprint(sprintInput.value);
                sprintDropdown.appendChild(div);
            }
        }

        function selectSprint(value) {
            sprintInput.value = value;
            sprintDropdown.classList.remove('show');
        }

        function getUniqueSprints() {
            const sprints = new Set(['Backlog']);
            allTickets.forEach(t => { if (t.sprint) sprints.add(t.sprint); });
            return Array.from(sprints).sort();
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<div class="loading-spinner"></div>';
            btn.disabled = true;

            const formData = new FormData(form);
            const data = {
                title: formData.get('title'),
                description: formData.get('description'),
                type: formData.get('type'),
                priority: formData.get('priority'),
                sprint: formData.get('sprint')
            };

            try {
                const res = await fetch(getApiBase(), {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if (res.ok) {
                    closeModal();
                    loadTickets();
                } else {
                    alert("Failed to create ticket");
                }
            } catch (err) {
                console.error(err);
                alert("Error creating ticket");
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        });

        // =====================
        // Init
        // =====================
        setupColumnDnD();
        route(); // Initial route
    </script>
</body>

</html>
